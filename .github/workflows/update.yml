name: Auto Update Nodes

# 触发条件
on:
  workflow_dispatch: # 开启这个选项，你就可以在 Actions 页面手动点击运行
  schedule:
    - cron: '0 */12 * * *' # 定时任务：每 12 小时在后台全自动运行一次

jobs:
  run-check:
    runs-on: ubuntu-latest
    steps:
    - name: 检出代码 (把你的仓库下载到虚拟服务器)
      uses: actions/checkout@v3

    - name: 配置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装依赖库
      run: |
        python -m pip install --upgrade pip
        # 安装仓库所需的依赖包
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 运行测速脚本
      run: |
        # 【重要】如果主脚本不叫 main.py，请把下面这行改成实际的文件名！
        python main.py

    - name: 保存并提交更新后的节点文件
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "自动更新节点成功" -a || exit 0
        git push
